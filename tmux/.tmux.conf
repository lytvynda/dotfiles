unbind r
bind r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"

set -g prefix C-s
set -g status-position top

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins/'

# Set 24 bit terminal color
set-option -sa terminal-overrides ",xterm*:Tc"

# Start windows and panes indexing at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-window on

# Enable mouse mode
set -g mouse on

# set vi-mode
set-window-option -g mode-keys vi

# Synchronize panes bindings
bind o setw synchronize-panes on
bind O setw synchronize-panes off

# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

# Open panes in current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Act like vim
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Remap yanking
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# List of plugins
set -g @tpm_plugins '             \
  tmux-plugins/tpm                \
  catppuccin/tmux                 \
  tmux-plugins/tmux-sensible      \
  tmux-plugins/tmux-resurrect     \
  tmux-plugins/tmux-continuum     \
  tmux-plugins/tmux-yank          \
  christoomey/vim-tmux-navigator  \
'

# Config
tmux_orange="#fab387"
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_window_left_separator "█"
set -g @catppuccin_window_right_separator "█ "
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_middle_separator "  █"
set -g @catppuccin_pane_border_style "fg=$tmux_orange"
set -g @catppuccin_pane_active_border_style "fg=$tmux_orange"
set -g @catppuccin_status_modules_right "session date_time"
set -g @catppuccin_session_icon " "
set -g @catppuccin_date_time_icon ""
set -g @catppuccin_date_time_text "%H:%M"
# Initialize TMUX plugin manager
run '~/.tmux/plugins/tpm/tpm'
